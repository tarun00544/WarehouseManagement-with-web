<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Warehouse Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-warehouse"></i> Warehouse Management System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="inventory.html">Inventory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="suppliers.html">Suppliers</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container-fluid py-4">
            <!-- Header -->
            <div class="row mb-4">
                <div class="col-md-8">
                    <h1 class="display-5">
                        <i class="fas fa-box"></i> Products
                    </h1>
                    <p class="text-muted">Manage your product catalog</p>
                </div>
                <div class="col-md-4 text-end">
                    <button class="btn btn-primary btn-lg" id="addProductBtn">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <input 
                            type="text" 
                            class="form-control" 
                            id="searchInput" 
                            placeholder="Search by product name or SKU..."
                        >
                        <button class="btn btn-outline-secondary" type="button" id="searchBtn">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>
            </div>

            <!-- Products Table -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">All Products</h5>
                    <span class="badge bg-primary" id="productCount">0</span>
                </div>
                <div class="card-body">
                    <div id="productsTableContainer">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title" id="productModalTitle">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <div class="mb-3">
                            <label for="productName" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>

                        <div class="mb-3">
                            <label for="productSku" class="form-label">SKU *</label>
                            <input type="text" class="form-control" id="productSku" required>
                        </div>

                        <div class="mb-3">
                            <label for="productCategory" class="form-label">Category *</label>
                            <input type="number" class="form-control" id="productCategory" required>
                        </div>

                        <div class="mb-3">
                            <label for="productPrice" class="form-label">Unit Price *</label>
                            <input type="number" class="form-control" id="productPrice" step="0.01" required>
                        </div>

                        <div class="mb-3">
                            <label for="productReorderLevel" class="form-label">Reorder Level *</label>
                            <input type="number" class="form-control" id="productReorderLevel" required>
                        </div>

                        <div class="mb-3">
                            <label for="productSupplier" class="form-label">Supplier ID *</label>
                            <input type="number" class="form-control" id="productSupplier" required>
                        </div>

                        <div class="mb-3">
                            <label for="productDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="productDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveProductBtn">Save Product</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-6">
                    <p>&copy; 2024 Warehouse Management System. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script src="/js/api.js"></script>
    <script>
        let currentEditId = null;
        const productModal = new bootstrap.Modal(document.getElementById('productModal'));

        /**
         * Load all products
         */
        async function loadProducts() {
            try {
                const data = await ProductAPI.getAll();
                if (data.success && data.data) {
                    displayProducts(data.data);
                    document.getElementById('productCount').textContent = data.count;
                }
            } catch (error) {
                console.error('Error loading products:', error);
                showToast('Error loading products', 'danger');
            }
        }

        /**
         * Display products in table
         */
        function displayProducts(products) {
            const container = document.getElementById('productsTableContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = '<p class="text-center text-muted py-4">No products found</p>';
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>SKU</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Reorder Level</th>
                                <th>Supplier</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            products.forEach(product => {
                html += `
                    <tr>
                        <td><strong>${product.sku}</strong></td>
                        <td>${product.productName}</td>
                        <td>${product.categoryName || '-'}</td>
                        <td>${formatCurrency(product.unitPrice)}</td>
                        <td>${product.reorderLevel}</td>
                        <td>${product.supplierName || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="editProduct(${product.productId})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.productId})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = html;
        }

        /**
         * Edit product
         */
        async function editProduct(id) {
            try {
                const data = await ProductAPI.getById(id);
                if (data.success && data.data) {
                    const product = data.data;
                    currentEditId = id;
                    
                    document.getElementById('productModalTitle').textContent = 'Edit Product';
                    document.getElementById('productName').value = product.productName;
                    document.getElementById('productSku').value = product.sku;
                    document.getElementById('productCategory').value = product.categoryId;
                    document.getElementById('productPrice').value = product.unitPrice;
                    document.getElementById('productReorderLevel').value = product.reorderLevel;
                    document.getElementById('productSupplier').value = product.supplierId;
                    document.getElementById('productDescription').value = product.description || '';
                    
                    productModal.show();
                }
            } catch (error) {
                console.error('Error loading product:', error);
                showToast('Error loading product', 'danger');
            }
        }

        /**
         * Delete product
         */
        async function deleteProduct(id) {
            if (confirmAction('Are you sure you want to delete this product?')) {
                try {
                    const data = await ProductAPI.delete(id);
                    if (data.success) {
                        showToast('Product deleted successfully', 'success');
                        loadProducts();
                    } else {
                        showToast('Error deleting product', 'danger');
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                    showToast('Error deleting product', 'danger');
                }
            }
        }

        /**
         * Search products
         */
        async function searchProducts() {
            const term = document.getElementById('searchInput').value.trim();
            if (!term) {
                loadProducts();
                return;
            }

            try {
                const data = await ProductAPI.search(term);
                if (data.success && data.data) {
                    displayProducts(data.data);
                    document.getElementById('productCount').textContent = data.count;
                }
            } catch (error) {
                console.error('Error searching products:', error);
                showToast('Error searching products', 'danger');
            }
        }

        // Event listeners
        document.getElementById('addProductBtn').addEventListener('click', () => {
            currentEditId = null;
            document.getElementById('productModalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            productModal.show();
        });

        document.getElementById('searchBtn').addEventListener('click', searchProducts);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchProducts();
        });

        document.getElementById('saveProductBtn').addEventListener('click', async () => {
            const product = {
                productName: document.getElementById('productName').value,
                sku: document.getElementById('productSku').value,
                categoryId: parseInt(document.getElementById('productCategory').value),
                unitPrice: parseFloat(document.getElementById('productPrice').value),
                reorderLevel: parseInt(document.getElementById('productReorderLevel').value),
                supplierId: parseInt(document.getElementById('productSupplier').value),
                description: document.getElementById('productDescription').value
            };

            try {
                let data;
                if (currentEditId) {
                    data = await ProductAPI.update(currentEditId, product);
                    if (data.success) {
                        showToast('Product updated successfully', 'success');
                    }
                } else {
                    data = await ProductAPI.add(product);
                    if (data.success) {
                        showToast('Product added successfully', 'success');
                    }
                }
                productModal.hide();
                loadProducts();
            } catch (error) {
                console.error('Error saving product:', error);
                showToast('Error saving product', 'danger');
            }
        });

        // Load products on page load
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
