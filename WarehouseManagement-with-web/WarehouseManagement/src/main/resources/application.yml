spring:
  application:
    name: warehouse-management-system
  
   spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  mvc:
    static-path-pattern: /**
    resources:
      static-locations:
        - classpath:/static/

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  
logging:
  level:
    root: INFO
    com.warehouse: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Application-specific properties
app:
  name: Warehouse Management System
  version: 1.0.0
  description: Automated warehouse management system for inventory and supply chain operations
